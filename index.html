<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Careers – Economic Policy Research Centre</title>
    <meta name="author" content="EPRC" />
    <meta property="og:title" content="Careers – Economic Policy Research Centre" />

    <link rel="icon" href="https://eprcug.org/wp-content/uploads/2020/08/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="https://eprcug.org/wp-content/uploads/2020/08/favicon.png" />

    <!-- Ohio theme + mega menu CSS from eprcug.org -->
    <link rel="stylesheet" href="https://eprcug.org/wp-content/themes/ohio/style.css" />
    <link rel="stylesheet" href="https://eprcug.org/wp-content/uploads/maxmegamenu/style.css" />
    <link rel="stylesheet" href="https://eprcug.org/wp-content/themes/ohio/assets/fonts/fa/css/all.css" />

    <!-- Ohio theme CSS variables and site-specific overrides (copied from eprcug.org) -->
    <style>
      :root {
        --clb-color-primary: #22a5d8;
        --clb-link-hover-color: #266090;
        --clb-button-color: #22a5d8;
        --clb-button-hover-color: #266090;
        --clb-body-font-family: 'Open Sans', sans-serif;
        --clb-body-light-mode-font-family: 'Open Sans', sans-serif;
        --clb-titles-font-family: 'Gotham', sans-serif;
        --clb-titles-color: #266090;
        --clb-subtitles-font-family: 'Gotham', sans-serif;
        --clb-subtitles-font-size: 16px;
        --clb-subtitles-text-transform: uppercase;
        --clb-subtitles-color: #22a5d8;
      }
      .site-footer { background-color: #003249; }
      .site-footer a:not(.-unlink) { color: #ffffff; }
      .site-footer-copyright { background-color: #003249; }
      .site-footer-copyright .holder { color: #ffffff; }
      .site-footer-copyright .holder a:not(.-unlink) { color: #ffffff; }
      .header:not(.-sticky) { background-color: #ffffff; }
      .header.-sticky:not(.header-8) { background-color: #ffffff; }
      .subheader { background-color: #003249; }
      .subheader, .subheader a { font-size: 14px; font-weight: 400; color: #ffffff; }
      .header:not(.-mobile) .menu { font-weight: 700; text-transform: uppercase; }
      .header:not(.-mobile) .menu ul { font-weight: 700; text-transform: uppercase; }
      .page-container.top-offset { padding-top: 40px; }
      .page-container.bottom-offset { padding-bottom: 40px; }
      .page-headline .bg-image {
        background-image: url('https://eprcug.org/wp-content/uploads/2025/07/EPRC-Building.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
      }
      .page-headline .title { font-size: 35px; line-height: 45px; color: #ffffff; }
      .page-headline .post-meta-holder, .page-headline .headline-meta { color: #ffffff; }
      @media screen and (min-width: 1181px) {
        .header .branding .logo img,
        .header .branding .logo-sticky img { min-height: 40px; height: 40px; }
        .page-headline { min-height: 400px; }
      }
      @media screen and (min-width: 769px) and (max-width: 1180px) {
        .page-headline { min-height: 300px; }
      }
      @media screen and (max-width: 768px) {
        .page-headline { min-height: 200px; }
      }
    </style>

    <!-- jQuery (required for mega menu JS) -->
    <script src="https://eprcug.org/wp-includes/js/jquery/jquery.min.js"></script>
    <script src="https://eprcug.org/wp-includes/js/jquery/jquery-migrate.min.js"></script>
  </head>

  <body class="page-template-default page with-header-1 with-left-mobile-hamburger with-subheader with-headline with-sticky-header with-mobile-switcher vc_responsive page-is-loaded">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
