services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Port 9001 (admin console) exposed only on localhost — not public
    ports:
      - "127.0.0.1:9001:9001"

  # ── API (Node.js / Fastify) ─────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      MINIO_ENDPOINT:      minio
      MINIO_PORT:          9000
      MINIO_USE_SSL:       "false"
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ODOO_API_KEY:        ${ODOO_API_KEY}
      ALLOWED_ORIGIN:      ${ALLOWED_ORIGIN}
      PORT:                3000
    networks:
      - internal
    # Not exposed to the host — nginx is the only entry point
    expose:
      - "3000"

  # ── Frontend (Vite build → Nginx static) ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"

  # ── Nginx (reverse proxy + TLS termination) ─────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Leave blank for local dev (self-signed cert generated automatically).
      # Set both in production to get a real Let's Encrypt certificate.
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-}
      CERTBOT_EMAIL:  ${CERTBOT_EMAIL:-}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs        # rw — entrypoint writes certs
      - letsencrypt_data:/etc/letsencrypt            # persist LE account + renewal config
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  letsencrypt_data:
