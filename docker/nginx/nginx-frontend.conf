# nginx-frontend.conf
# Served inside the `frontend` container — static Vite build for the React SPA.
# The outer `nginx` reverse-proxy container handles TLS termination and forwards
# both /api/* and /functions/* to the `api` container, so this server only
# needs to serve static assets and push all unknown paths back to index.html.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Serve pre-compressed assets when available
    gzip_static on;

    # Cache-bust hashed assets forever; serve others with short TTL
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # HTML — no-cache so the browser always gets the latest index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — route all unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
