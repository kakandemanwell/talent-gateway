# nginx.conf
# Outer (edge) nginx reverse-proxy for the EPRC Jobs Portal Docker stack.
#
# This file is the FULL nginx.conf (not a conf.d snippet) — it is mounted to
# /etc/nginx/nginx.conf inside the nginx container.
#
# Topology:
#   Internet → nginx(:80/:443) → frontend(:80)  for React SPA assets
#                              → api(:3000)      for /api/* and /functions/*
#
# TLS certificates are expected at:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
#
# Mount those files via docker-compose volume (or Docker secrets).
# For local development without TLS, uncomment the HTTP-only server block
# at the bottom and comment out the HTTPS block.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout 65;

# ── Upstream definitions ─────────────────────────────────────────────────────
upstream frontend_upstream {
    server host.docker.internal:8080;
    keepalive 32;
}

upstream api_upstream {
    server api:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (with API/functions passthrough for Odoo) ──────────
server {
    listen 80;
    server_name _;

    # Allow ACME / Let's Encrypt challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Allow Odoo (Hyper-V VM) to call the API over plain HTTP without TLS
    location ~ ^/(api|functions)/ {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # TLS
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # File upload size — matches @fastify/multipart 10 MB limit
    client_max_body_size 11m;

    # ── MinIO file downloads (publicly accessible via presigned URLs) ─────────
    # Odoo (and any remote server) downloads CV/accolade files via presigned URLs
    # that point to this path. nginx proxies to MinIO internally and passes
    # Host: minio:9000 so that MinIO's HMAC presigned-URL signature still validates.
    location /application-files/ {
        proxy_pass          http://minio:9000;
        proxy_http_version  1.1;
        proxy_set_header    Connection  "";
        proxy_set_header    Host        minio:9000;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── API + Odoo gateway routes ─────────────────────────────────────────────
    # All REST API traffic and Odoo gateway traffic is forwarded to the api service.
    location ~ ^/(api|functions)/ {
        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Timeouts generous enough for large multipart uploads
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check passthrough (used by Docker healthcheck) ─────────────────
    location = /health {
        proxy_pass         http://api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # ── Static frontend (React SPA) ───────────────────────────────────────────
    location / {
        proxy_pass          http://frontend_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}

